# wahook config — see TECHDOC.md §5 for the full schema reference.

device:
  store: ./wa.db

media:
  # public_url: https://wahook.example.com  # if set, media.file_url is populated
  storage: ./files  # where downloaded media is stored
  max_bytes: 10485760 # 10MB; larger files are skipped with an error note

webhooks:
  - name: local-test
    url: http://localhost:9000/wa
    # headers:
    #   Authorization: Bearer xxx
    timeout: 10s
    retry: 2
    filters:
      groups_only: false
      dm_only: false
      ignore_from_me: false
      ignore_broadcast: true
      senders: []
      keyword_prefix: ""

  # - name: n8n
  #   url: https://n8n.local/webhook/wa
